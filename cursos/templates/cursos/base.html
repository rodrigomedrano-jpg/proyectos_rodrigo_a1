{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi LMS{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'cursos/css/styles.css' %}">
</head>
<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🎓 Mi LMS</h1>
            </div>
            <ul class="nav-links">
                <li><a href="{% url 'cursos:index' %}">Inicio</a></li>
                <li><a href="{% url 'cursos:lista_cursos' %}">Cursos</a></li>
                <li><a href="{% url 'cursos:acerca' %}">Acerca de</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido principal (aquí los templates hijos inyectarán su contenido) -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2024 Mi LMS. Todos los derechos reservados.</p>
            <p>Desarrollado con Django 🐍</p>
        </div>
    </footer>
</body>
</html>
